<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SP组合工作流画布（Graph）</title>
  <style>
    :root{--bg:#0e1118;--panel:#141923;--card:#1a2130;--line:#8ea2c4;--muted:#8fa1bd;--txt:#e6edf7;--pri:#3b82f6;--ok:#22c55e}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 30% 10%,#182034 0%,#0d1117 52%);font-family:Inter,-apple-system,"PingFang SC",sans-serif;color:var(--txt)}
    .top{padding:14px 16px;border-bottom:1px solid #273043;background:#0f141f;position:sticky;top:0;z-index:5}
    .title{font-size:18px;font-weight:800}
    .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .toolbar{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
    .btn{padding:8px 12px;border-radius:10px;border:1px solid #2b364d;background:#1a2334;color:#dbe6ff;cursor:pointer;font-weight:700}
    .btn.pri{background:linear-gradient(135deg,#2563eb,#4f46e5);border:none}

    .wrap{padding:14px}
    .canvas{position:relative;height:76vh;min-height:620px;border:1px solid #28344a;border-radius:14px;overflow:auto;
      background:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px) 0 0/24px 24px,
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px) 0 0/24px 24px,
      #0f1522;}
    svg.links{position:absolute;inset:0;pointer-events:none}

    .node{position:absolute;width:220px;background:var(--card);border:1px solid #3a4866;border-radius:12px;padding:10px;box-shadow:0 8px 18px rgba(0,0,0,.28)}
    .node .h{font-size:12px;color:#9cb0d4;margin-bottom:8px}
    .node .t{font-size:13px;font-weight:800;margin-bottom:8px}
    .opts{display:flex;gap:6px;flex-wrap:wrap}
    .opt{padding:4px 8px;border-radius:999px;border:1px solid #43567b;background:#27324a;color:#9fb3d7;font-size:11px;cursor:pointer}
    .opt.active{background:linear-gradient(135deg,#2563eb,#7c3aed);border-color:transparent;color:#fff}
    .node.calc{border-color:#2c8f5e}
    .node.calc .t{color:#86efac}
    .result{font-size:12px;line-height:1.6;color:#d8e4ff;white-space:pre-wrap;background:#11192a;border:1px dashed #3b4f78;padding:8px;border-radius:8px}
  </style>
</head>
<body>
  <div class="top">
    <div class="title">SP 组合工作流画布（n8n风格）</div>
    <div class="sub">灰色未选中 / 高亮已选中 · 连线流程图</div>
    <div class="toolbar">
      <button class="btn" onclick="setPreset()">套用默认</button>
      <button class="btn" onclick="syncFromMain()">读取主向导参数</button>
      <button class="btn pri" onclick="calc()">计算组合数</button>
    </div>
  </div>

  <div class="wrap">
    <div class="canvas" id="canvas">
      <svg class="links" id="links"></svg>

      <div class="node" id="n0" style="left:40px;top:250px">
        <div class="h">Start</div><div class="t">SP组合输入</div>
        <div style="font-size:12px;color:#9fb0cf">按流程逐步设定维度</div>
      </div>

      <div class="node" id="n1" style="left:320px;top:40px">
        <div class="h">Step 1</div><div class="t">产品类型数</div>
        <div class="opts" data-key="productTypes" data-default="3">
          <button class="opt" data-v="1">1</button><button class="opt" data-v="2">2</button><button class="opt" data-v="3">3</button>
        </div>
      </div>

      <div class="node" id="n2" style="left:320px;top:170px">
        <div class="h">Step 2</div><div class="t">生命周期数</div>
        <div class="opts" data-key="lifecycles" data-default="4">
          <button class="opt" data-v="1">1</button><button class="opt" data-v="2">2</button><button class="opt" data-v="3">3</button><button class="opt" data-v="4">4</button>
        </div>
      </div>

      <div class="node" id="n3" style="left:320px;top:300px">
        <div class="h">Step 3</div><div class="t">活动目的数</div>
        <div class="opts" data-key="objectives" data-default="7">
          <button class="opt" data-v="1">1</button><button class="opt" data-v="2">2</button><button class="opt" data-v="3">3</button><button class="opt" data-v="4">4</button><button class="opt" data-v="5">5</button><button class="opt" data-v="6">6</button><button class="opt" data-v="7">7</button>
        </div>
      </div>

      <div class="node" id="n4" style="left:320px;top:430px">
        <div class="h">Step 4</div><div class="t">广告位类型数</div>
        <div class="opts" data-key="placements" data-default="3">
          <button class="opt" data-v="1">1</button><button class="opt" data-v="2">2</button><button class="opt" data-v="3">3</button>
        </div>
      </div>

      <div class="node" id="n5" style="left:620px;top:130px">
        <div class="h">Step 5</div><div class="t">竞价策略数</div>
        <div class="opts" data-key="bids" data-default="3">
          <button class="opt" data-v="1">1</button><button class="opt" data-v="2">2</button><button class="opt" data-v="3">3</button>
        </div>
      </div>

      <div class="node" id="n6" style="left:620px;top:300px">
        <div class="h">Step 6</div><div class="t">关键词属性数</div>
        <div class="opts" data-key="kwAttrs" data-default="13">
          <button class="opt" data-v="1">1</button><button class="opt" data-v="3">3</button><button class="opt" data-v="5">5</button><button class="opt" data-v="8">8</button><button class="opt" data-v="13">13</button>
        </div>
      </div>

      <div class="node calc" id="n7" style="left:910px;top:220px">
        <div class="h">Step 7</div><div class="t">计算总组合</div>
        <button class="btn pri" onclick="calc()">计算</button>
      </div>

      <div class="node" id="n8" style="left:1180px;top:180px;width:300px">
        <div class="h">Output</div><div class="t">结果</div>
        <div class="result" id="out">点击“计算”查看</div>
      </div>
    </div>
  </div>

<script>
const state={productTypes:3,lifecycles:4,objectives:7,placements:3,bids:3,kwAttrs:13};

function initOptions(){
  document.querySelectorAll('.opts').forEach(group=>{
    const key=group.dataset.key;
    group.querySelectorAll('.opt').forEach(btn=>{
      btn.onclick=()=>{state[key]=Number(btn.dataset.v);paintOptions();};
    });
  });
  paintOptions();
}

function paintOptions(){
  document.querySelectorAll('.opts').forEach(group=>{
    const key=group.dataset.key;
    group.querySelectorAll('.opt').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.v)===state[key]));
  });
}

function nodeCenter(id,right=true){
  const el=document.getElementById(id), c=document.getElementById('canvas');
  const r=el.getBoundingClientRect(), cr=c.getBoundingClientRect();
  return {x:(right?r.right:r.left)-cr.left + c.scrollLeft, y:r.top-cr.top + r.height/2 + c.scrollTop};
}

function path(a,b){
  const dx=Math.max(40,(b.x-a.x)*0.45);
  return `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`;
}

function drawLinks(){
  const svg=document.getElementById('links');
  const c=document.getElementById('canvas');
  svg.setAttribute('width',c.scrollWidth);
  svg.setAttribute('height',c.scrollHeight);
  const pairs=[['n0','n1'],['n0','n2'],['n0','n3'],['n0','n4'],['n1','n5'],['n2','n5'],['n3','n6'],['n4','n6'],['n5','n7'],['n6','n7'],['n7','n8']];
  svg.innerHTML=pairs.map(([s,t])=>{
    const a=nodeCenter(s,true), b=nodeCenter(t,false);
    return `<path d="${path(a,b)}" stroke="${'#8ea2c4'}" stroke-width="2" fill="none" opacity="0.8"/>`;
  }).join('');
}

function calc(){
  const auto=1*state.bids;
  const kw=3*state.kwAttrs*state.bids;
  const prod=2*state.bids;
  const base=auto+kw+prod;
  const total=base*state.objectives*state.lifecycles*state.placements*state.productTypes;
  document.getElementById('out').textContent=
`基础组合 = 自动(1×${state.bids}) + 手动关键词(3×${state.kwAttrs}×${state.bids}) + 手动商品(2×${state.bids})\n= ${auto} + ${kw} + ${prod} = ${base}\n\n总组合 = ${base} × ${state.objectives} × ${state.lifecycles} × ${state.placements} × ${state.productTypes}\n= ${total}`;
}

function setPreset(){ state.productTypes=3;state.lifecycles=4;state.objectives=7;state.placements=3;state.bids=3;state.kwAttrs=13; paintOptions(); calc(); }
function syncFromMain(){ alert('主站参数同步可按需再接入（当前先用独立工作流版）。'); }

window.addEventListener('resize',drawLinks);
document.getElementById('canvas').addEventListener('scroll',drawLinks);
initOptions();
drawLinks();
calc();
</script>
</body>
</html>
