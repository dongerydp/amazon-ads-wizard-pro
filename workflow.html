<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SP组合工作流画布（Graph）</title>
  <style>
    :root{--bg:#0e1118;--panel:#141923;--card:#1a2130;--line:#8ea2c4;--muted:#8fa1bd;--txt:#e6edf7;--pri:#3b82f6;--ok:#22c55e;--canvas:#0f1522;--grid:rgba(255,255,255,.03);--topbg:#0f141f;--topline:#273043;--btnbg:#1a2334;--btnbd:#2b364d;--btntxt:#dbe6ff}
    body.theme-light{--bg:#f2f6ff;--panel:#ffffff;--card:#ffffff;--line:#8ea2c4;--muted:#64748b;--txt:#0f172a;--pri:#2563eb;--ok:#16a34a;--canvas:#f8fbff;--grid:rgba(15,23,42,.06);--topbg:#ffffff;--topline:#dbe5f5;--btnbg:#ffffff;--btnbd:#cbd5e1;--btntxt:#1e293b}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 30% 10%,#182034 0%,#0d1117 52%);font-family:Inter,-apple-system,"PingFang SC",sans-serif;color:var(--txt)}
    body.theme-light{background:radial-gradient(circle at 30% 10%,#eaf1ff 0%,#f8fbff 52%)}
    .top{padding:14px 16px;border-bottom:1px solid var(--topline);background:var(--topbg);position:sticky;top:0;z-index:5}
    .title{font-size:18px;font-weight:800}
    .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .toolbar{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .btn{padding:8px 12px;border-radius:10px;border:1px solid var(--btnbd);background:var(--btnbg);color:var(--btntxt);cursor:pointer;font-weight:700}
    .btn.pri{background:linear-gradient(135deg,#2563eb,#4f46e5);border:none}
    .badge{font-size:12px;color:#c7d2fe;border:1px solid #324463;padding:6px 10px;border-radius:999px}

    .wrap{padding:14px}
    .welcome{border:1px solid #2b3a57;background:linear-gradient(135deg,#111a2b,#131f35);border-radius:14px;padding:20px;margin-bottom:12px}
    .welcome .wtitle{font-size:20px;font-weight:800;margin-bottom:6px}
    .welcome .wsub{font-size:13px;color:#9fb3d7;line-height:1.7}
    .canvas{position:relative;height:76vh;min-height:620px;border:1px solid #28344a;border-radius:14px;overflow:auto;
      background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/24px 24px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/24px 24px,
      var(--canvas);}
    svg.links{position:absolute;inset:0;pointer-events:none}

    .node{position:absolute;width:220px;background:var(--card);border:1px solid #3a4866;border-radius:12px;padding:10px;box-shadow:0 8px 18px rgba(0,0,0,.28);transition:.2s;cursor:grab}
    .node.dragging{cursor:grabbing}
    .node.locked{opacity:.35;filter:grayscale(.3)}
    .node.current{box-shadow:0 8px 18px rgba(0,0,0,.28);border-color:#3a4866}
    .node.done{opacity:1;filter:none;border-color:#3a4866;box-shadow:0 8px 18px rgba(0,0,0,.28)}
    .node .h{font-size:12px;color:#9cb0d4;margin-bottom:8px}
    .node .t{font-size:13px;font-weight:800;margin-bottom:8px}
    .opts{display:flex;gap:6px;flex-wrap:wrap}
    .opt{padding:4px 8px;border-radius:999px;border:1px solid #43567b;background:#27324a;color:#9fb3d7;font-size:11px;cursor:pointer}
    .opt.active{background:linear-gradient(135deg,#2563eb,#7c3aed);border-color:transparent;color:#fff;box-shadow:0 0 0 2px rgba(96,165,250,.35)}
    .node.calc{border-color:#2c8f5e}
    .node.calc .t{color:#86efac}
    .result{font-size:12px;line-height:1.6;color:#d8e4ff;white-space:pre-wrap;background:#11192a;border:1px dashed #3b4f78;padding:8px;border-radius:8px}
  </style>
</head>
<body>
  <div class="top">
    <div class="title">SP 组合工作流画布（n8n风格）</div>
    <div class="sub">灰色未选中 / 高亮已选中 · 连线流程图</div>
    <div class="toolbar">
      <button class="btn" onclick="prevStep()">上一步</button>
      <button class="btn pri" onclick="nextStep()">下一步</button>
      <button class="btn" onclick="setPreset()">重置默认</button>
      <button class="btn" onclick="syncFromMain()">读取主向导参数</button>
      <button class="btn pri" onclick="calc()">计算组合数</button>
      <button class="btn" onclick="toggleTheme()" id="themeBtn">切换浅色</button>
      <span class="badge" id="progress">当前：Step 1 / 6（先选产品类型）</span>
    </div>
  </div>

  <div class="wrap">
    <div class="welcome" id="welcome">
      <div class="wtitle">先选产品类型，再逐步完成投放路径</div>
      <div class="wsub">这是单线流程画布：产品类型 → 当前周期 → 活动目的 → 广告位 → 竞价策略 → 关键词属性。<br/>点击「开始配置」后进入流程，页面不混杂，按步骤推进。</div>
      <div class="toolbar" style="margin-top:12px">
        <button class="btn pri" onclick="startFlow()">开始配置</button>
      </div>
    </div>
    <div class="canvas" id="canvas" style="display:none">
      <svg class="links" id="links"></svg>

      <div class="node" id="n0" style="left:40px;top:250px">
        <div class="h">Start</div><div class="t">SP组合输入</div>
        <div style="font-size:12px;color:#9fb0cf">按流程逐步设定维度</div>
      </div>

      <div class="node" id="n1" data-step="1" style="left:320px;top:40px">
        <div class="h">Step 1</div><div class="t">产品类型</div>
        <div class="opts" data-key="productType" data-default="标品">
          <button class="opt" data-v="标品">标品</button><button class="opt" data-v="半标品">半标品</button><button class="opt" data-v="非标品">非标品</button>
        </div>
      </div>

      <div class="node" id="n2" data-step="2" style="left:320px;top:170px">
        <div class="h">Step 2</div><div class="t">当前周期</div>
        <div class="opts" data-key="lifecycle" data-default="成长期">
          <button class="opt" data-v="导入期">导入期</button><button class="opt" data-v="成长期">成长期</button><button class="opt" data-v="成熟期">成熟期</button><button class="opt" data-v="衰退期">衰退期</button>
        </div>
      </div>

      <div class="node" id="n3" data-step="3" style="left:320px;top:300px">
        <div class="h">Step 3</div><div class="t">活动目的</div>
        <div class="opts" data-key="objective" data-default="出单">
          <button class="opt" data-v="曝光">曝光</button><button class="opt" data-v="扩流">扩流</button><button class="opt" data-v="出单">出单</button><button class="opt" data-v="盈利">盈利</button><button class="opt" data-v="推排名">推排名</button><button class="opt" data-v="防御">防御</button><button class="opt" data-v="打标签">打标签</button>
        </div>
      </div>

      <div class="node" id="n4" data-step="4" style="left:320px;top:430px">
        <div class="h">Step 4</div><div class="t">广告位</div>
        <div class="opts" data-key="placement" data-default="Top of Search">
          <button class="opt" data-v="Top of Search">Top of Search</button><button class="opt" data-v="Product Pages">Product Pages</button><button class="opt" data-v="Rest of Search">Rest of Search</button>
        </div>
      </div>

      <div class="node" id="n5" data-step="5" style="left:620px;top:130px">
        <div class="h">Step 5</div><div class="t">竞价策略</div>
        <div class="opts" data-key="bid" data-default="动态竞价-提高和降低">
          <button class="opt" data-v="动态竞价-只降低">动态竞价-只降低</button><button class="opt" data-v="动态竞价-提高和降低">动态竞价-提高和降低</button><button class="opt" data-v="固定竞价">固定竞价</button>
        </div>
      </div>

      <div class="node" id="n6" data-step="6" style="left:620px;top:300px">
        <div class="h">Step 6</div><div class="t">关键词属性</div>
        <div class="opts" data-key="kwAttr" data-default="核心精准">
          <button class="opt" data-v="核心精准">核心精准</button><button class="opt" data-v="核心次精准">核心次精准</button><button class="opt" data-v="核心长尾">核心长尾</button><button class="opt" data-v="品类大词">品类大词</button><button class="opt" data-v="大品牌词">大品牌词</button><button class="opt" data-v="竞品品牌词">竞品品牌词</button><button class="opt" data-v="自有品牌词">自有品牌词</button><button class="opt" data-v="互补词">互补词</button><button class="opt" data-v="gift词">gift词</button><button class="opt" data-v="促销词">促销词</button><button class="opt" data-v="不相关词">不相关词</button><button class="opt" data-v="外语词">外语词</button><button class="opt" data-v="错拼词">错拼词</button>
        </div>
      </div>

      <div class="node calc" id="n7" style="left:910px;top:220px;display:none">
        <div class="h">Step 7</div><div class="t">计算总组合</div>
        <button class="btn pri" onclick="calc()">计算</button>
      </div>

      <div class="node" id="n8" style="left:1180px;top:180px;width:300px;display:none">
        <div class="h">Output</div><div class="t">结果</div>
        <div class="result" id="out">点击“计算”查看</div>
      </div>
    </div>
  </div>

<script>
const state={productType:'标品',lifecycle:'成长期',objective:'出单',placement:'Top of Search',bid:'动态竞价-提高和降低',kwAttr:'核心精准'};
const stepKeys=['productType','lifecycle','objective','placement','bid','kwAttr'];
let currentStep=1;

function initOptions(){
  document.querySelectorAll('.opts').forEach(group=>{
    const key=group.dataset.key;
    group.querySelectorAll('.opt').forEach(btn=>{
      btn.onclick=()=>{
        const step = stepKeys.indexOf(key)+1;
        if(step!==currentStep) return; // 只能操作当前步骤
        state[key]=btn.dataset.v;
        paintOptions();
        if(currentStep<6){ currentStep++; updateStepUI(); }
        calc();
      };
    });
  });
  paintOptions();
  updateStepUI();
}

function paintOptions(){
  document.querySelectorAll('.opts').forEach(group=>{
    const key=group.dataset.key;
    group.querySelectorAll('.opt').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.v)===state[key]));
  });
}

function updateStepUI(){
  document.querySelectorAll('.node[data-step]').forEach(node=>{
    const s=Number(node.dataset.step);
    const isCurrent = s===currentStep;
    const isDone = s<currentStep;
    node.classList.toggle('locked',!isCurrent && !isDone);
    node.classList.toggle('current',isCurrent);
    node.classList.toggle('done',isDone);
    // 只显示已完成+当前步骤；后续未选步骤不显示
    node.style.display = (isDone || isCurrent) ? 'block' : 'none';
  });
  // 计算与输出节点仅在完成所有步骤后显示
  document.getElementById('n7').style.display = currentStep>=6 ? 'block' : 'none';
  document.getElementById('n8').style.display = currentStep>=6 ? 'block' : 'none';

  const p=document.getElementById('progress');
  p.textContent = `当前：Step ${currentStep} / 6（${['产品类型','当前周期','活动目的','广告位','竞价策略','关键词属性'][currentStep-1]}）`;
  drawLinks();
}
function nextStep(){ if(currentStep<6){ currentStep++; updateStepUI(); } }
function prevStep(){ if(currentStep>1){ currentStep--; updateStepUI(); } }

function nodeCenter(id,right=true){
  const el=document.getElementById(id), c=document.getElementById('canvas');
  const r=el.getBoundingClientRect(), cr=c.getBoundingClientRect();
  return {x:(right?r.right:r.left)-cr.left + c.scrollLeft, y:r.top-cr.top + r.height/2 + c.scrollTop};
}

function path(a,b){
  const dx=Math.max(40,(b.x-a.x)*0.45);
  return `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`;
}

function drawLinks(){
  const svg=document.getElementById('links');
  const c=document.getElementById('canvas');
  svg.setAttribute('width',c.scrollWidth);
  svg.setAttribute('height',c.scrollHeight);
  // 单线流程：Start -> Step1 -> Step2 -> Step3 -> Step4 -> Step5 -> Step6 -> Calc -> Output
  const pairs=[['n0','n1'],['n1','n2'],['n2','n3'],['n3','n4'],['n4','n5'],['n5','n6'],['n6','n7'],['n7','n8']];
  svg.innerHTML=pairs.map(([s,t],idx)=>{
    const se=document.getElementById(s), te=document.getElementById(t);
    if(!se || !te || se.style.display==='none' || te.style.display==='none') return '';
    const a=nodeCenter(s,true), b=nodeCenter(t,false);
    const isActive = idx <= currentStep;
    const stroke = isActive ? '#9ec5ff' : '#5f7192';
    const op = isActive ? '0.95' : '0.45';
    return `<path d="${path(a,b)}" stroke="${stroke}" stroke-width="2.5" fill="none" opacity="${op}"/>`;
  }).join('');
}

function calc(){
  const text =
`当前已选路径：\n`+
`产品类型：${state.productType}\n`+
`当前周期：${state.lifecycle}\n`+
`活动目的：${state.objective}\n`+
`广告位：${state.placement}\n`+
`竞价策略：${state.bid}\n`+
`关键词属性：${state.kwAttr}\n\n`+
`说明：这是“单路径一步步选择”模式，每次只确定 1 条投放路径。\n`+
`如需看全量组合规模，再切回组合计算页。`;
  document.getElementById('out').textContent=text;
}

function startFlow(){
  document.getElementById('welcome').style.display='none';
  document.getElementById('canvas').style.display='block';
  drawLinks();
}
function setPreset(){ state.productType='标品';state.lifecycle='成长期';state.objective='出单';state.placement='Top of Search';state.bid='动态竞价-提高和降低';state.kwAttr='核心精准'; currentStep=1; paintOptions(); updateStepUI(); calc(); }
function syncFromMain(){ alert('主站参数同步可按需再接入（当前先用独立工作流版）。'); }

function toggleTheme(){
  const light=document.body.classList.toggle('theme-light');
  document.getElementById('themeBtn').textContent = light ? '切换深色' : '切换浅色';
  setTimeout(drawLinks,0);
}

function initDrag(){
  const canvas=document.getElementById('canvas');
  let dragging=null, offsetX=0, offsetY=0;
  document.querySelectorAll('.node').forEach(node=>{
    node.addEventListener('mousedown',e=>{
      if(e.target.closest('button')) return; // 按钮点击不触发拖动
      dragging=node;
      const rect=node.getBoundingClientRect();
      offsetX=e.clientX-rect.left;
      offsetY=e.clientY-rect.top;
      node.classList.add('dragging');
      e.preventDefault();
    });
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const cr=canvas.getBoundingClientRect();
    const left=e.clientX-cr.left+canvas.scrollLeft-offsetX;
    const top=e.clientY-cr.top+canvas.scrollTop-offsetY;
    dragging.style.left=Math.max(0,left)+'px';
    dragging.style.top=Math.max(0,top)+'px';
    drawLinks();
  });
  window.addEventListener('mouseup',()=>{
    if(dragging) dragging.classList.remove('dragging');
    dragging=null;
  });
}

window.addEventListener('resize',drawLinks);
document.getElementById('canvas').addEventListener('scroll',drawLinks);
initOptions();
initDrag();
drawLinks();
calc();
</script>
</body>
</html>
